repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check --fix
        entry: uv run ruff check --fix
        language: system
        files: \.py$
        pass_filenames: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        files: \.py$
        pass_filenames: true
